<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Multi-Potentiel — Panel d'opportunités</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui,-apple-system,sans-serif;background:#F8F7F4;overflow:hidden;height:100vh;}
mark{display:inline;padding:1px 4px 2px;border-radius:3px;font-weight:700;}
.hy{background:#FFE033;color:#111;}
.hg{background:#6EFF6A;color:#111;}
.hp{background:#FF6BD6;color:#111;}
.hc{background:#4DFFF3;color:#111;}
.ho{background:#FFB347;color:#111;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useCallback}=React;
const H={
  y:t=><mark className="hy">{t}</mark>,
  g:t=><mark className="hg">{t}</mark>,
  p:t=><mark className="hp">{t}</mark>,
  c:t=><mark className="hc">{t}</mark>,
  o:t=><mark className="ho">{t}</mark>,
};
const BG="#F8F7F4";
const lbl=(c="#FF4F1F")=>({fontSize:10,letterSpacing:3,textTransform:"uppercase",fontWeight:700,color:c,marginBottom:10});
const ttl=(sz=32)=>({fontWeight:800,fontSize:sz,color:"#111",lineHeight:1.05,marginBottom:14});
const card=(bc="#E0E0E0",bgc="#fff")=>({background:bgc,border:`1.5px solid ${bc}`,borderRadius:10,padding:"12px 16px"});
function ProfileBox({items,color}){
  return(
    <div style={{background:`${color}08`,border:`1.5px solid ${color}33`,borderRadius:10,padding:"12px 16px",marginTop:8}}>
      <div style={{...lbl(color),marginBottom:6}}>✦ C'est pour vous si…</div>
      {items.map((p,i)=>(
        <div key={i} style={{display:"flex",gap:6,fontSize:12,color:"#333",lineHeight:1.5,marginBottom:5}}>
          <span style={{color,fontWeight:700,flexShrink:0}}>→</span>{p}
        </div>
      ))}
    </div>
  );
}
function Stats({items,color}){
  return(
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:8}}>
      {items.map((s,i)=>(
        <div key={i} style={{...card(`${color}44`,`${color}08`)}}>
          <div style={{fontWeight:800,fontSize:18,color,lineHeight:1}}>{s.n}</div>
          <div style={{fontSize:11,color:"#777",marginTop:2,lineHeight:1.4}}>{s.l}</div>
        </div>
      ))}
    </div>
  );
}
function MarketSlide({e}){
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:BG,padding:"20px 24px",overflow:"auto"}}>
      <div style={lbl(e.color)}>{e.icon} {e.secteur} — Marché</div>
      <h2 style={{...ttl(22),marginBottom:12}}>{e.market.titre}</h2>
      <Stats items={e.market.stats} color={e.color}/>
      <div style={{marginTop:10,...card("#E5E5E5","#fff"),fontSize:12,color:"#555",lineHeight:1.6}}>{e.market.contexte}</div>
      <div style={{marginTop:8,padding:"10px 14px",background:`${e.color}08`,borderLeft:`3px solid ${e.color}`,borderRadius:"0 6px 6px 0",fontSize:12,color:"#555",fontStyle:"italic"}}>{e.market.tendance}</div>
    </div>
  );
}
function EnseigneSlide({e}){
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:BG,padding:"20px 24px",overflow:"auto"}}>
      <div style={lbl(e.color)}>{e.icon} L'enseigne</div>
      <h2 style={{...ttl(22),marginBottom:10}}>{e.name}</h2>
      <div style={{fontSize:13,color:"#555",lineHeight:1.6,marginBottom:10}}>{e.enseigne.description}</div>
      <div style={{...card(`${e.color}44`,`${e.color}06`),fontSize:12,marginBottom:10}}><strong style={{color:e.color}}>Différenciateur :</strong> {e.enseigne.differenciateur}</div>
      <Stats items={e.enseigne.stats} color={e.color}/>
    </div>
  );
}
function MissionSlide({e}){
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:BG,padding:"20px 24px",overflow:"auto"}}>
      <div style={lbl(e.color)}>Mission & Conditions</div>
      <div style={{marginBottom:8}}>{e.mission.quotidien.map((q,i)=>(<div key={i} style={{display:"flex",gap:6,fontSize:12,color:"#333",lineHeight:1.5,marginBottom:5}}><span style={{color:e.color,fontWeight:700,flexShrink:0}}>→</span>{q}</div>))}</div>
      <div style={{...card(`${e.color}44`,`${e.color}06`),fontSize:12,marginBottom:8}}><strong style={{color:e.color}}>Exemple :</strong> {e.mission.exemple.desc}<br/><strong style={{color:e.color}}>{e.mission.exemple.calcul}</strong></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>{[{l:"Statut",v:e.mission.statut},{l:"Apport/DE",v:e.mission.apport},{l:"Rémunération",v:e.mission.commission},{l:"Clients",v:e.mission.clients}].map((r,i)=>(<div key={i} style={card("#E0E0E0","#fff")}><div style={{fontSize:10,color:"#999",letterSpacing:1,textTransform:"uppercase"}}>{r.l}</div><div style={{fontSize:12,fontWeight:600,color:"#222",lineHeight:1.3,marginTop:2}}>{r.v}</div></div>))}</div>
      <ProfileBox items={e.profil} color={e.color}/>
    </div>
  );
}

    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
