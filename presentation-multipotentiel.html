<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Multi-Potentiel — Panel d'opportunités</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui,-apple-system,sans-serif;background:#F8F7F4;overflow:hidden;height:100vh;}
mark{display:inline;padding:1px 4px 2px;border-radius:3px;font-weight:700;}
.hy{background:#FFE033;color:#111;}
.hg{background:#6EFF6A;color:#111;}
.hp{background:#FF6BD6;color:#111;}
.hc{background:#4DFFF3;color:#111;}
.ho{background:#FFB347;color:#111;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useCallback}=React;

const H={
  y:t=><mark className="hy">{t}</mark>,
  g:t=><mark className="hg">{t}</mark>,
  p:t=><mark className="hp">{t}</mark>,
  c:t=><mark className="hc">{t}</mark>,
  o:t=><mark className="ho">{t}</mark>,
};

const BG="#F8F7F4";
const lbl=(c="#FF4F1F")=>({fontSize:10,letterSpacing:3,textTransform:"uppercase",fontWeight:700,color:c,marginBottom:10});
const ttl=(sz=32)=>({fontWeight:800,fontSize:sz,color:"#111",lineHeight:1.05,marginBottom:14});
const card=(bc="#E0E0E0",bgc="#fff")=>({background:bgc,border:`1.5px solid ${bc}`,borderRadius:10,padding:"12px 16px"});

function ProfileBox({items,color}){
  return(
    <div style={{background:`${color}08`,border:`1.5px solid ${color}33`,borderRadius:10,padding:"12px 16px",marginTop:8}}>
      <div style={{...lbl(color),marginBottom:6}}>✦ C'est pour vous si…</div>
      {items.map((p,i)=>(
        <div key={i} style={{display:"flex",gap:6,fontSize:12,color:"#333",lineHeight:1.5,marginBottom:5}}>
          <span style={{color,fontWeight:700,flexShrink:0}}>→</span>{p}
        </div>
      ))}
    </div>
  );
}

function Stats({items,color}){
  return(
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:8}}>
      {items.map((s,i)=>(
        <div key={i} style={{...card(`${color}44`,`${color}08`)}}>
          <div style={{fontWeight:800,fontSize:18,color,lineHeight:1}}>{s.n}</div>
          <div style={{fontSize:11,color:"#777",marginTop:2,lineHeight:1.4}}>{s.l}</div>
        </div>
      ))}
    </div>
  );
}

function MarketSlide({e}){
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:BG,padding:"20px 24px",overflow:"auto"}}>
      <div style={lbl(e.color)}>{e.icon} {e.secteur} — Marché</div>
      <h2 style={{...ttl(22),marginBottom:12}}>{e.market.titre}</h2>
      <Stats items={e.market.stats} color={e.color}/>
      <div style={{marginTop:10,...card("#E5E5E5","#fff"),fontSize:12,color:"#555",lineHeight:1.6}}>
        {e.market.contexte}
      </div>
      <div style={{marginTop:8,padding:"10px 14px",background:`${e.color}08`,borderLeft:`3px solid ${e.color}`,borderRadius:"0 6px 6px 0",fontSize:12,color:"#555",fontStyle:"italic"}}>
        {e.market.tendance}
      </div>
    </div>
  );
}

function EnseigneSlide({e}){
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:BG,padding:"20px 24px",overflow:"auto"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
        {e.logo&&<img src={e.logo} alt={e.name} style={{height:40,maxWidth:120,objectFit:"contain"}} onError={ev=>{ev.target.style.display="none"}}/>}
        {!e.logo&&<div style={lbl(e.color)}>{e.icon} L'enseigne</div>}
      </div>
      <h2 style={{...ttl(22),marginBottom:10}}>{e.name}</h2>
      <div style={{fontSize:13,color:"#555",lineHeight:1.6,marginBottom:10}}>{e.enseigne.description}</div>
      <div style={{...card(`${e.color}44`,`${e.color}06`),fontSize:12,marginBottom:10}}>
        <strong style={{color:e.color}}>Différenciateur :</strong> {e.enseigne.differenciateur}
      </div>
      <Stats items={e.enseigne.stats} color={e.color}/>
    </div>
  );
}

function MissionSlide({e}){
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:BG,padding:"20px 24px",overflow:"auto"}}>
      <div style={lbl(e.color)}>Mission & Conditions</div>
      <div style={{marginBottom:8}}>
        {e.mission.quotidien.map((q,i)=>(
          <div key={i} style={{display:"flex",gap:6,fontSize:12,color:"#333",lineHeight:1.5,marginBottom:5}}>
            <span style={{color:e.color,fontWeight:700,flexShrink:0}}>→</span>{q}
          </div>
        ))}
      </div>
      <div style={{...card(`${e.color}44`,`${e.color}06`),fontSize:12,marginBottom:8}}>
        <strong style={{color:e.color}}>Exemple :</strong> {e.mission.exemple.desc}<br/>
        <strong style={{color:e.color}}>{e.mission.exemple.calcul}</strong>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
        {[{l:"Statut",v:e.mission.statut},{l:"Apport/DE",v:e.mission.apport},{l:"Rémunération",v:e.mission.commission},{l:"Clients",v:e.mission.clients}].map((r,i)=>(
          <div key={i} style={card("#E0E0E0","#fff")}>
            <div style={{fontSize:10,color:"#999",letterSpacing:1,textTransform:"uppercase"}}>{r.l}</div>
            <div style={{fontSize:12,fontWeight:600,color:"#222",lineHeight:1.3,marginTop:2}}>{r.v}</div>
          </div>
        ))}
      </div>
      <ProfileBox items={e.profil} color={e.color}/>
    </div>
  );
}

function App(){

  const slide=ALL_SLIDES[cur];

  const goTo=useCallback(i=>{
    if(i>=0&&i<total){setCur(i);setShowMenu(false);}
  },[total]);

  const slideTypeLabel=slide.id.endsWith("-m")?"🌐 Marché":slide.id.endsWith("-e")?"🏢 Enseigne":slide.id.endsWith("-c")?"⚙️ Mission":null;

  return(
    <div style={{width:"100vw",height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}}>
      {/* Top bar */}
      <div style={{height:40,background:"#fff",borderBottom:"1px solid #E5E5E5",display:"flex",alignItems:"center",padding:"0 14px",gap:8,flexShrink:0}}>
        <span style={{fontSize:11,color:"#ccc"}}>{cur+1}/{total}</span>
        {slideTypeLabel&&<span style={{background:`${slide.color}15`,color:slide.color,fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:10,border:`1px solid ${slide.color}30`}}>{slideTypeLabel}</span>}
        <span style={{fontSize:12,fontWeight:700,color:slide.color,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{slide.label}</span>
        <button onClick={()=>setShowMenu(m=>!m)} style={{background:"#FF4F1F",border:"none",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",color:"#fff",fontWeight:600,flexShrink:0}}>
          {showMenu?"✕ Fermer":"☰ Plan"}
        </button>
      </div>

      {/* Slide area */}
      <div style={{flex:1,overflow:"hidden",position:"relative"}}>
        {ALL_SLIDES.map((s,i)=>(
          <div key={s.id} style={{
            position:"absolute",inset:0,
            opacity:i===cur?1:0,
            pointerEvents:i===cur?"all":"none",
            transform:`translateX(${i===cur?0:i<cur?-20:20}px)`,
            transition:"opacity .3s, transform .3s",
            overflowY:"auto",
          }}>
            {s.render()}
          </div>
        ))}
      </div>

      {/* Navigation */}
      <div style={{height:52,background:"#fff",borderTop:"1px solid #E5E5E5",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 16px",flexShrink:0}}>
        <button onClick={()=>goTo(cur-1)} disabled={cur===0} style={{background:cur===0?"#eee":"#FF4F1F",border:"none",borderRadius:8,color:cur===0?"#aaa":"#fff",fontSize:16,cursor:cur===0?"default":"pointer",padding:"8px 18px",fontWeight:800}}>←</button>
        <div style={{display:"flex",gap:3,overflow:"hidden",maxWidth:"calc(100% - 120px)"}}>
          {ALL_SLIDES.map((_,i)=>(
            <div key={i} onClick={()=>goTo(i)} style={{
              width:i===cur?12:4,height:4,borderRadius:2,flexShrink:0,
              background:i===cur?(ALL_SLIDES[i].color||"#FF4F1F"):"#ddd",
              cursor:"pointer",transition:"all .3s",
            }}/>
          ))}
        </div>
        <button onClick={()=>goTo(cur+1)} disabled={cur===total-1} style={{background:cur===total-1?"#eee":"#FF4F1F",border:"none",borderRadius:8,color:cur===total-1?"#aaa":"#fff",fontSize:16,cursor:cur===total-1?"default":"pointer",padding:"8px 18px",fontWeight:800}}>→</button>
      </div>

      {/* Menu overlay */}
      {showMenu&&(
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.5)",zIndex:50,display:"flex",flexDirection:"column"}} onClick={()=>setShowMenu(false)}>
          <div style={{background:"#fff",maxHeight:"85vh",overflowY:"auto",marginTop:"auto",borderRadius:"16px 16px 0 0",padding:"16px 0"}} onClick={e=>e.stopPropagation()}>
            <div style={{padding:"0 16px 12px",borderBottom:"1px solid #F0F0F0"}}>
              <div style={{fontSize:12,fontWeight:700,color:"#333"}}>Navigation — {total} slides</div>
            </div>
            {GROUPS.map(g=>{
              const slides=ALL_SLIDES.filter(s=>s.group===g.id);
              return(
                <div key={g.id} style={{borderBottom:"1px solid #F8F8F8"}}>
                  <div style={{padding:"8px 16px 4px",fontSize:11,fontWeight:700,color:g.color,textTransform:"uppercase",letterSpacing:1}}>
                    {g.icon} {g.label}
                  </div>
                  {slides.map(s=>{
                    const idx=ALL_SLIDES.indexOf(s);
                    const isActive=idx===cur;
                    const lbl=s.id.endsWith("-m")?"Marché":s.id.endsWith("-e")?"Enseigne":s.id.endsWith("-c")?"Mission & Conditions":s.label;
                    return(
                      <div key={s.id} onClick={()=>goTo(idx)} style={{
                        padding:"8px 24px",fontSize:13,cursor:"pointer",
                        color:isActive?g.color:"#555",
                        background:isActive?`${g.color}10`:"transparent",
                        borderLeft:`3px solid ${isActive?g.color:"transparent"}`,
                        fontWeight:isActive?700:400,
                      }}>
                        {lbl}
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
