function ProfileBox({items,color}){
  return(

function Stats({items,color}){

function App(){
  const [cur,setCur]=useState(0);

  const slide=ALL_SLIDES[cur];
  const goTo=useCallback(i=>{if(i>=0&&i<total){setCur(i);setShowMenu(false);}},[total]);
  const slideTypeLabel=slide.id.endsWith("-m")?"🌐 Marché":slide.id.endsWith("-e")?"🏢 Enseigne":slide.id.endsWith("-c")?"⚙️ Mission":null;

    <div style={{width:"100vw",height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}}>

      </div>
      <div style={{height:52,background:"#fff",borderTop:"1px solid #E5E5E5",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 16px",flexShrink:0}}>

        <button onClick={()=>goTo(cur+1)} disabled={cur===total-1} style={{background:cur===total-1?"#eee":"#FF4F1F",border:"none",borderRadius:8,color:cur===total-1?"#aaa":"#fff",fontSize:16,cursor:cur===total-1?"default":"pointer",padding:"8px 18px",fontWeight:800}}>→</button>

                  const idx=ALL_SLIDES.indexOf(s);
                  const isActive=idx===cur;
                  const lbl=s.id.endsWith("-m")?"Marché":s.id.endsWith("-e")?"Enseigne":s.id.endsWith("-c")?"Mission & Conditions":s.label;
                  return(<div key={s.id} onClick={()=>goTo(idx)} style={{padding:"8px 24px",fontSize:13,cursor:"pointer",color:isActive?g.color:"#555",background:isActive?`${g.color}10`:"transparent",borderLeft:`3px solid ${isActive?g.color:"transparent"}`,fontWeight:isActive?700:400}}>{lbl}</div>);
