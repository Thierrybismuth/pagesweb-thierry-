<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; font-family: 'Outfit', sans-serif; color: #fff; overflow-x: hidden; }

  /* Header */
  .header {
    background: #1e3d52;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }
  .header h1 {
    font-size: 1rem;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.02em;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .slide-counter {
    font-size: 0.85rem;
    color: #7ab5a8;
    font-weight: 500;
  }

  /* Slideshow container */
  .slideshow {
    position: relative;
    width: 100%;
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 16px 16px;
  }

  /* Slide */
  .slide {
    display: none;
    animation: fadeIn 0.25s ease;
  }
  .slide.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .slide img {
    width: 100%;
    height: auto;
    border-radius: 8px;
    display: block;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  /* Navigation */
  .nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 20px 16px 24px;
  }
  .nav-btn {
    background: #c8733a;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px 28px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    min-width: 120px;
  }
  .nav-btn:hover { background: #e87848; }
  .nav-btn:active { transform: scale(0.97); }
  .nav-btn:disabled { background: #444; cursor: default; }

  /* Progress bar */
  .progress-bar {
    width: 100%;
    max-width: 1100px;
    margin: 0 auto;
    height: 4px;
    background: #333;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #c8733a;
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  /* Thumbnails strip */
  .thumbnails {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 12px 16px 20px;
    max-width: 1100px;
    margin: 0 auto;
    scrollbar-width: thin;
    scrollbar-color: #c8733a #222;
  }
  .thumbnails::-webkit-scrollbar { height: 4px; }
  .thumbnails::-webkit-scrollbar-track { background: #222; }
  .thumbnails::-webkit-scrollbar-thumb { background: #c8733a; border-radius: 2px; }

  .thumb {
    flex-shrink: 0;
    width: 100px;
    cursor: pointer;
    border-radius: 4px;
    overflow: hidden;
    border: 2px solid transparent;
    transition: border-color 0.2s, transform 0.15s;
    opacity: 0.6;
  }
  .thumb:hover { opacity: 1; transform: scale(1.05); }
  .thumb.active { border-color: #c8733a; opacity: 1; }
  .thumb img { width: 100%; height: auto; display: block; }

  /* Keyboard hint */
  .hint {
    text-align: center;
    color: #555;
    font-size: 0.75rem;
    padding-bottom: 20px;
  }

  /* Fullscreen */
  .fullscreen-btn {
    background: transparent;
    border: 1px solid #3a5f7a;
    color: #7ab5a8;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .fullscreen-btn:hover { background: #1e3d52; }

  /* sendHeight for Wix */
  @media (max-width: 768px) {
    .nav-btn { padding: 10px 18px; font-size: 0.9rem; min-width: 90px; }
    .thumb { width: 70px; }
    .header h1 { font-size: 0.85rem; }
  }
</style>

<p class="hint">← → Touches clavier pour naviguer</p>

<script>
  const TOTAL = 61;
  let current = 0;

  function updateUI() {
    document.querySelectorAll('.slide').forEach((s, i) => s.classList.toggle('active', i === current));
    document.querySelectorAll('.thumb').forEach((t, i) => {
      t.classList.toggle('active', i === current);
      if (i === current) t.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    });
    document.getElementById('counter').textContent = `${current + 1} / ${TOTAL}`;
    document.getElementById('progress').style.width = `${((current + 1) / TOTAL) * 100}%`;
    document.getElementById('prevBtn').disabled = current === 0;
    document.getElementById('nextBtn').disabled = current === TOTAL - 1;
    sendHeight();
  }

  function changeSlide(dir) {
    current = Math.max(0, Math.min(TOTAL - 1, current + dir));
    updateUI();
  }

  function goToSlide(idx) {
    current = idx;
    updateUI();
    document.getElementById('slideshow').scrollIntoView({ behavior: 'smooth' });
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changeSlide(1);
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') changeSlide(-1);
  });

  // Touch/swipe support
  let touchX = null;
  document.getElementById('slideshow').addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
  document.getElementById('slideshow').addEventListener('touchend', e => {
    if (!touchX) return;
    const diff = touchX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) changeSlide(diff > 0 ? 1 : -1);
    touchX = null;
  });

  function sendHeight() {
    const h = document.body.scrollHeight;
    window.parent.postMessage({ type: 'iframeHeight', height: h }, '*');
  }

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  }

  window.addEventListener('resize', sendHeight);
  sendHeight();
</script>
