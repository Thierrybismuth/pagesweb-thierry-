ore>=2?'#fffbeb':'#f8fafc',border:'1px solid '+(score>=4?'#a7d9b8':score>=2?'#fcd34d':'#d0e4d8'),borderRadius:12,padding:'14px 16px',marginBottom:18,textAlign:'center'}}><div style={{fontSize:32,marginBottom:6}}>{score>=4?'🔥':score>=2?'👍':'🌱'}</div><div style={{fontSize:20,fontWeight:800,color:score>=4?'#1a6b3a':score>=2?'#b45309':'#6b7280'}}>{score} univers avec contacts</div><div style={{fontSize:13,color:'#6b7280',marginTop:4}}>{score>=5?'Excellent réseau — vous signez vos 3 premiers clients en moins d’un mois.':score>=3?'Bon point de départ — concentrez-vous sur vos contacts chauds.':score>=1?'Un contact suffit — exploitez-le à fond avant de prospecter à froid.':'Réseau à construire — commencez par les annuaires et les événements locaux.'}</div></div><div style={{display:'flex',justifyContent:'space-between'}}>{btn('← Retour',()=>setStep('simulation'))}{btn('Voir mon bilan →',()=>setStep('bilan'),true)}</div></div>}

y={x.id} style={{textAlign:'center',padding:'10px 6px',borderRadius:8,background:reseau[x.id]==='oui'?'#e8f5ee':reseau[x.id]==='peutetre'?'#fffbeb':'#f8fafc',border:'1px solid '+(reseau[x.id]==='oui'?'#a7d9b8':'#d0e4d8')}}><div style={{fontSize:18,marginBottom:3}}>{x.icon}</div><div style={{fontSize:11,fontWeight:600}}>{x.label}</div><div style={{fontSize:10,marginTop:2,color:reseau[x.id]==='oui'?'#1a6b3a':reseau[x.id]==='peutetre'?'#b45309':'#9ca3af'}}>{reseau[x.id]==='oui'?'✅ Contact':reseau[x.id]==='peutetre'?'🤔 À voir':'À prospecter'}</div></div>)}</div></>)}<div style={{background:'#1a6b3a',color:'white',borderRadius:12,padding:'18px 20px',textAlign:'center'}}><div style={{fontSize:16,fontWeight:800,marginBottom:6}}>Prêt(e) à démarrer ?</div><div style={{fontSize:13,color:'#a7d9b8',marginBottom:14}}>Objectif : 3 clients signés dans les 60 premiers jours.</div><div style={{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}}><button onClick={()=>setStep('simulation')} style={{background:'rgba(255,255,255,0.15)',color:'white',border:'1px solid rgba(255,255,255,0.3)',padding:'9px 14px',borderRadius:8,fontSize:13,cursor:'pointer'}}>← Relancer une simulation</button><button onClick={()=>{setStep('intro');setSel(null);setReseau({});setContacts({});}} style={{background:'white',color:'#1a6b3a',border:'none',padding:'9px 14px',borderRadius:8,fontSize:13,fontWeight:700,cursor:'pointer'}}>🔄 Recommencer</button></div></div></div>}
