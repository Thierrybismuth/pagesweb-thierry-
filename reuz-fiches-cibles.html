<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',system-ui,sans-serif; background:#f4f7f5; }

      { icon: '💰', titre: 'Économie réelle', texte: 'Un service Re-uz coûte moins cher que racheter des jetables chaque saison. Et Re-uz livre, lave, récupère. Le gérant ne gère plus rien.' },
      { icon: '🌿', titre: 'Argument marketing', texte: '"Camping zéro déchet" est un argument de réservation. Les plateformes (Homair, Yelloh) le demandent. Les clients 4-5 étoiles l\'exigent.' },
      { icon: '🍺', titre: 'Beer Up = upsell', texte: 'La tireuse Beer Up est faite pour les campings. Self-service, cashless, col de mousse parfait. C\'est un argument de vente supplémentaire pour le gérant envers ses clients.' },

      { icon: '🖨️', titre: 'Gobelet personnalisé = sponsor', texte: 'Les hippodromes ont des partenaires (PMU, brasseurs locaux). Un gobelet IML full couleur au logo du sponsor valorise le partenariat — et justifie un prix plus élevé.' },
      { icon: '⚖️', titre: 'Obligation légale', texte: 'ERP + public + boissons = obligation de réemploi. La Fédération Nationale des Courses Hippiques pousse ses membres à se conformer avant les contrôles.' },
      { icon: '💼', titre: 'Décision rapide', texte: 'La société de courses = 1 directeur, 1 décision. Pas de comité RSE, pas de DSI. L\'argument financier + légal suffit. Délai de signature : 2 à 4 semaines.' },
    ],
    objection: {
      texte: '"On n\'a pas le budget pour ça"',
      reponse: 'Le service Re-uz remplace votre achat annuel de gobelets. Vous ne dépensez plus rien en consommables — et vous confiez le lavage à Re-uz. Le coût net est souvent négatif la 1ère année.',
    },

      'Gobelets plastique réutilisables achetés en masse, lavés en cuisine entre les concerts',
      'Investissement lourd en gobelet stock (pertes, casse, vol)',

      'Certaines salles passent encore au jetable pour les "petits" événements',
    ],
    pourquoi: [
      { icon: '🔄', titre: 'Externaliser le lavage', texte: 'Re-uz livre propre avant le concert, récupère sale après. Le directeur technique n\'a plus à gérer le stock, la casse, le lavage. C\'est son argument numéro 1.' },
      { icon: '📊', titre: 'Volume × fréquence = CA massif', texte: '1 000 gobelets × 10 concerts/mois × 12 mois = 24 000€ de CA service. La commission récurrente sur 48 mois dépasse les 10 000€ pour ce seul client.' },

    portrait: 'L\'agence événementielle est un multiplicateur. Elle ne consomme pas les gobelets elle-même — elle les intègre dans ses packs client. Une agence active fait 10 à 40 événements par mois. Signez l\'agence, vous signez tous ses clients en une fois.',
    usage_actuel: [
      'Location ou achat de gobelets jetables pour chaque événement (coût refacturé au client)',

      'Les marques imposent de plus en plus "zéro jetable" dans leurs cahiers des charges événement',
    ],
    pourquoi: [
      { icon: '📦', titre: 'Service intégré dans leurs packs', texte: 'L\'agence intègre Re-uz dans son devis client comme une ligne prestataire. Elle refacture avec marge. Re-uz devient un argument de vente pour elle aussi.' },
      { icon: '🔁', titre: 'Récurrence automatique', texte: 'Une agence sous contrat Re-uz génère des commissions à chaque événement sans aucune action de votre part. C\'est du revenu passif pur.' },
      { icon: '📋', titre: 'Cahiers des charges RSE', texte: 'ABInBev, Heineken, Coca-Cola imposent "zéro plastique" dans leurs briefs d\'activation. L\'agence qui propose Re-uz répond à cette exigence — et remporte plus d\'appels d\'offres.' },
      { icon: '🤝', titre: 'Partenariat long terme', texte: 'Une agence ne change pas de prestataire gobelet tous les ans. Si vous entrez dans leur process, vous y restez. Durée contrat : 36-60 mois.' },
    ],
    objection: {
      texte: '"On a déjà un prestataire gobelet"',
      reponse: 'Quand se termine votre contrat actuel ? Et votre prestataire propose-t-il le service complet livraison-lavage-collecte sur chaque event, même les petits ? Re-uz le fait à partir de 200 gobelets.',
    },
    sim: { gob: 1000, rotations: 120, label_rot: 'événements / an', label_gob: 'gobelets actifs / événement' },
    exemples: ['Agences MICE', 'Agences séminaires / team building', 'Event managers freelance', 'Agences de com événementielle'],
  },
};

function Simulateur({ cible }) {
  const [gob, setGob] = React.useState(cible.sim.gob);
  const [rot, setRot] = React.useState(cible.sim.rotations);

  const caService = Math.round(gob * rot * 0.20);
  const caVente = Math.round(gob * 0.30);
  const comService = Math.round(caService * 0.12);
  const comVente = Math.round(caVente * 0.08);
  const com48 = comService * 4; // 48 mois

  return (
    <div style={{background:'#111c14',color:'white',borderRadius:14,padding:24,marginTop:24}}>
      <div style={{fontSize:12,color:'#6fca96',fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginBottom:20}}>
        📊 Simulateur — Un client {cible.label}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
        <div>
          <label style={{fontSize:11,color:'rgba(255,255,255,0.5)',display:'block',marginBottom:6}}>
            {cible.sim.label_gob}
          </label>
          <input
            type="range" min={Math.round(cible.sim.gob*0.2)} max={cible.sim.gob*3} step={50}
            value={gob} onChange={e=>setGob(+e.target.value)}
            style={{width:'100%',accentColor:cible.couleur}}
          />
          <div style={{fontSize:18,fontWeight:800,color:'white',marginTop:6}}>{gob.toLocaleString('fr-FR')}</div>
        </div>
        <div>
          <label style={{fontSize:11,color:'rgba(255,255,255,0.5)',display:'block',marginBottom:6}}>
            {cible.sim.label_rot}
          </label>
          <input
            type="range" min={Math.round(cible.sim.rotations*0.2)} max={cible.sim.rotations*2} step={1}
            value={rot} onChange={e=>setRot(+e.target.value)}
            style={{width:'100%',accentColor:'#7c3aed'}}
          />
          <div style={{fontSize:18,fontWeight:800,color:'white',marginTop:6}}>{rot}</div>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
        <div style={{background:'rgba(255,255,255,0.06)',borderRadius:10,padding:'12px 14px'}}>
          <div style={{fontSize:10,color:'rgba(255,255,255,0.5)',marginBottom:4}}>CA vente (stock)</div>
          <div style={{fontSize:22,fontWeight:800,color:'#6fca96'}}>{caVente.toLocaleString('fr-FR')}€</div>
          <div style={{fontSize:10,color:'rgba(255,255,255,0.35)',marginTop:2}}>one-shot · com 8% = {comVente.toLocaleString('fr-FR')}€</div>
        </div>
        <div style={{background:'rgba(255,255,255,0.06)',borderRadius:10,padding:'12px 14px'}}>
          <div style={{fontSize:10,color:'rgba(255,255,255,0.5)',marginBottom:4}}>CA service / an</div>
          <div style={{fontSize:22,fontWeight:800,color:'white'}}>{caService.toLocaleString('fr-FR')}€</div>
          <div style={{fontSize:10,color:'rgba(255,255,255,0.35)',marginTop:2}}>récurrent · com 12% = {comService.toLocaleString('fr-FR')}€/an</div>
        </div>
        <div style={{background:cible.couleur+'33',border:'1px solid '+cible.couleur+'66',borderRadius:10,padding:'12px 14px'}}>
          <div style={{fontSize:10,color:'rgba(255,255,255,0.6)',marginBottom:4}}>Votre com sur 48 mois</div>
          <div style={{fontSize:22,fontWeight:800,color:'white'}}>{com48.toLocaleString('fr-FR')}€</div>
          <div style={{fontSize:10,color:'rgba(255,255,255,0.4)',marginTop:2}}>durée contrat standard</div>
        </div>
      </div>
    </div>
  );
}

function FicheCible({ id }) {
  const c = CIBLES[id];
  return (
    <div style={{maxWidth:820,margin:'0 auto',padding:'24px 16px'}}>

      {/* Header */}
      <div style={{background:c.couleur,borderRadius:16,padding:'28px 28px 20px',color:'white',marginBottom:20}}>
        <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:2,opacity:0.7,marginBottom:8}}>Fiche cible Re-uz</div>
        <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:16}}>
          <div style={{fontSize:40}}>{c.icon}</div>
          <div>
            <h1 style={{fontSize:28,fontWeight:900,lineHeight:1}}>{c.label}</h1>
            <p style={{fontSize:14,opacity:0.85,marginTop:4}}>{c.accroche}</p>
          </div>
        </div>
      </div>

      {/* Portrait */}
      <div style={{background:'white',border:'1px solid #e0e8ec',borderRadius:12,padding:20,marginBottom:16}}>
        <div style={{fontSize:11,fontWeight:700,color:c.couleur,textTransform:'uppercase',letterSpacing:1,marginBottom:10}}>🎯 Qui sont-ils ?</div>
        <p style={{fontSize:14,color:'#374151',lineHeight:1.7}}>{c.portrait}</p>
      </div>

      {/* Usage actuel */}
      <div style={{background:'white',border:'1px solid #e0e8ec',borderRadius:12,padding:20,marginBottom:16}}>
        <div style={{fontSize:11,fontWeight:700,color:'#b45309',textTransform:'uppercase',letterSpacing:1,marginBottom:12}}>🗑️ Comment ils utilisent la vaisselle aujourd'hui</div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {c.usage_actuel.map((u,i) => (
            <div key={i} style={{display:'flex',gap:10,alignItems:'flex-start',padding:'8px 10px',background:'#fff5f5',borderRadius:8,border:'1px solid #fecaca'}}>
              <span style={{color:'#dc2626',fontWeight:700,fontSize:14,flexShrink:0}}>→</span>
              <span style={{fontSize:13,color:'#374151'}}>{u}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Pourquoi ça les intéresse */}
      <div style={{background:'white',border:'1px solid #e0e8ec',borderRadius:12,padding:20,marginBottom:16}}>
        <div style={{fontSize:11,fontWeight:700,color:'#1a6b3a',textTransform:'uppercase',letterSpacing:1,marginBottom:14}}>✅ Pourquoi Re-uz les intéresse</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          {c.pourquoi.map((p,i) => (
            <div key={i} style={{background:'#f4f7f5',borderRadius:10,padding:'14px 16px'}}>
              <div style={{fontSize:18,marginBottom:6}}>{p.icon}</div>
              <div style={{fontSize:13,fontWeight:700,color:'#1a2e3a',marginBottom:4}}>{p.titre}</div>
              <div style={{fontSize:12,color:'#4b6358',lineHeight:1.5}}>{p.texte}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Objection */}
      <div style={{background:'#fffbeb',border:'1px solid #fcd34d',borderLeft:'4px solid #f0a500',borderRadius:8,padding:'14px 18px',marginBottom:16}}>
        <div style={{fontSize:11,fontWeight:700,color:'#92400e',textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>💬 Objection fréquente</div>
        <div style={{fontSize:14,fontWeight:700,color:'#92400e',marginBottom:6,fontStyle:'italic'}}>"{c.objection.texte}"</div>
        <div style={{fontSize:13,color:'#374151',lineHeight:1.6}}>→ {c.objection.reponse}</div>
      </div>

      {/* Simulateur */}
      <Simulateur cible={c} />

      {/* Exemples */}
      <div style={{marginTop:16,padding:'14px 18px',background:'white',border:'1px solid #e0e8ec',borderRadius:10}}>
        <div style={{fontSize:11,fontWeight:700,color:'#6b7280',textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>Exemples de clients</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
          {c.exemples.map(ex => (
            <span key={ex} style={{background:c.couleur+'18',color:c.couleur,border:'1px solid '+c.couleur+'40',padding:'4px 12px',borderRadius:20,fontSize:12,fontWeight:500}}>{ex}</span>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [active, setActive] = React.useState('camping');
  const cibles = Object.entries(CIBLES);

  return (
    <div style={{minHeight:'100vh',background:'#f4f7f5'}}>
      {/* Nav */}
      <div style={{background:'#111c14',padding:'0 16px',position:'sticky',top:0,zIndex:100,boxShadow:'0 2px 12px rgba(0,0,0,0.3)'}}>
        <div style={{maxWidth:820,margin:'0 auto',display:'flex',gap:0,overflowX:'auto'}}>
          {cibles.map(([id,c]) => (
            <button key={id} onClick={()=>setActive(id)} style={{
              padding:'14px 18px',fontSize:13,fontWeight:active===id?700:500,
              background:'none',border:'none',borderBottom:active===id?`3px solid ${c.couleur}`:'3px solid transparent',
              color:active===id?'white':'rgba(255,255,255,0.5)',cursor:'pointer',whiteSpace:'nowrap',
              display:'flex',alignItems:'center',gap:6
            }}>
              <span>{c.icon}</span> {c.label}
            </button>
          ))}
        </div>
      </div>

      <FicheCible id={active} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
