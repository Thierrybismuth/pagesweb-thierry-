function Sim({ c }) {
  const [g, setG] = React.useState(c.sim.gob);
  const [r, setR] = React.useState(c.sim.rot);
  const cas = Math.round(g * r * 0.20);
  const cav = Math.round(g * 0.30);
  const cs = Math.round(cas * 0.12);
