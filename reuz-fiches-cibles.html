  beerup:  { label:"Beer Up System", bg:"#7c3aed", desc:"Tireuse biere brevetee - cashless - self-service" },
  newcy:   { label:"Newcy Cafe",     bg:"#b45309", desc:"Pause cafe cle en main - abonnement mensuel" },
};

function Sim({ cible }) {
  const { produit, gob0, freq0, lgob, lfreq, freqMax } = cible.sim;
  const [g, setG] = React.useState(gob0);
  const [f, setF] = React.useState(freq0);
  const fmt = n => Math.round(n).toLocaleString("fr-FR");

  let caS=0,caV=0,comS=0,comV=0,com48=0,caB=0,comB=0;
  if (produit==="service"||produit==="service+beerup"||produit==="service+vente") {
    caS=g*f*0.20; comS=caS*0.12;
  }
  if (produit==="vente"||produit==="service+vente") {
    caV=g*(produit==="vente"?f:1)*0.30; comV=caV*0.08;
  }
  if (produit==="beerup"||produit==="service+beerup") {
    caB=g*(produit==="beerup"?f:1)*0.20; comB=caB*0.12;
  }
  if (produit==="newcy") { caS=g*f*0.15; comS=caS*0.12; }
  com48 = comS*4 + comV + comB*4;

  return (
    <div style={{background:"#111c14",color:"white",borderRadius:12,padding:18,marginTop:14}}>
      <div style={{fontSize:10,color:"#6fca96",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:14}}>Simulateur - 1 client</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
        <div>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.45)",marginBottom:4}}>{lgob}</div>
          <input type="range" min={Math.max(50,Math.round(gob0*0.2))} max={gob0*3} step={50} value={g} onChange={e=>setG(+e.target.value)} style={{width:"100%",accentColor:"#f0a500"}}/>
          <div style={{fontSize:16,fontWeight:800,color:"white",marginTop:2}}>{fmt(g)}</div>
        </div>
        <div>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.45)",marginBottom:4}}>{lfreq}</div>
          <input type="range" min={1} max={freqMax||freq0*2} step={1} value={f} onChange={e=>setF(+e.target.value)} style={{width:"100%",accentColor:"#7c3aed"}}/>
          <div style={{fontSize:16,fontWeight:800,color:"white",marginTop:2}}>{f}</div>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:8}}>
        {caS>0 && <div style={{background:"rgba(255,255,255,0.06)",borderRadius:8,padding:"10px 12px"}}>
          <div style={{fontSize:9,color:"rgba(255,255,255,0.4)",marginBottom:2}}>CA service / an</div>
          <div style={{fontSize:17,fontWeight:800,color:"#6fca96"}}>{fmt(caS)}eu</div>
          <div style={{fontSize:9,color:"rgba(255,255,255,0.3)"}}>com 12% = {fmt(comS)}eu/an</div>
        </div>}
        {caV>0 && <div style={{background:"rgba(255,255,255,0.06)",borderRadius:8,padding:"10px 12px"}}>
          <div style={{fontSize:9,color:"rgba(255,255,255,0.4)",marginBottom:2}}>CA vente</div>
          <div style={{fontSize:17,fontWeight:800,color:"white"}}>{fmt(caV)}eu</div>
          <div style={{fontSize:9,color:"rgba(255,255,255,0.3)"}}>com 8% = {fmt(comV)}eu</div>
        </div>}
        {caB>0 && <div style={{background:"rgba(120,80,200,0.2)",borderRadius:8,padding:"10px 12px"}}>
          <div style={{fontSize:9,color:"rgba(200,160,255,0.7)",marginBottom:2}}>CA Beer Up / an</div>
          <div style={{fontSize:17,fontWeight:800,color:"#c4a0ff"}}>{fmt(caB)}eu</div>
          <div style={{fontSize:9,color:"rgba(255,255,255,0.3)"}}>com 12% = {fmt(comB)}eu/an</div>
        </div>}
        <div style={{background:"rgba(240,165,0,0.18)",border:"1px solid rgba(240,165,0,0.4)",borderRadius:8,padding:"10px 12px"}}>
          <div style={{fontSize:9,color:"#f0a500",marginBottom:2}}>Votre com. 48 mois</div>
          <div style={{fontSize:17,fontWeight:800,color:"white"}}>{fmt(com48)}eu</div>
          <div style={{fontSize:9,color:"rgba(255,255,255,0.4)"}}>duree contrat standard</div>
        </div>
      </div>
    </div>
  );
}

      </div>

}

      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        <div style={{background:"white",border:"1px solid #e0e8ec",borderRadius:10,padding:16}}>
          <div style={{fontSize:10,fontWeight:700,color:c.col,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Portrait client</div>
          <p style={{fontSize:12,color:"#374151",lineHeight:1.7}}>{c.portrait}</p>

        <div style={{background:"white",border:"1px solid #e0e8ec",borderRadius:10,padding:16}}>
          <div style={{fontSize:10,fontWeight:700,color:"#b45309",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Usage actuel (le probleme)</div>
          {c.usage.map((u,i)=>(
            <div key={i} style={{display:"flex",gap:6,padding:"5px 7px",background:"#fff5f5",borderRadius:5,border:"1px solid #fecaca",marginBottom:4}}>

        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {c.produits.map((p,i)=><ProdCard key={i} p={p}/>)}
        </div>
      </div>

      <Sim cible={c}/>

      <div style={{background:"#fffbeb",borderLeft:"4px solid #f0a500",padding:"12px 16px",marginTop:12}}>
        <div style={{fontSize:10,fontWeight:700,color:"#92400e",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Objection frequente & reponse terrain</div>
        <div style={{fontSize:13,fontWeight:700,color:"#92400e",marginBottom:5,fontStyle:"italic"}}>"{c.objection}"</div>
        <div style={{fontSize:12,color:"#374151",lineHeight:1.6}}>{"--> "}{c.reponse}</div>
      </div>

      <div style={{marginTop:12,background:"#111c14",borderRadius:8,padding:"11px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.5)"}}>Question ? Verifier la dispo de votre zone ?</div>
        <a href="tel:+33610703090" style={{color:"#f0a500",fontWeight:900,fontSize:17,textDecoration:"none"}}>06 10 70 30 90</a>
      </div>
    </div>
  );
}
