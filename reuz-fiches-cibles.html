  vente:   { label:'Ecocup VENTE',   color:'#b45309', bg:'#fffbeb', desc:'Vente one-shot de gobelets personnalisés. Commission 8%. Renouvellement annuel.' },
  beerup:  { label:'Beer Up SYSTEM', color:'#7c3aed', bg:'#f3f0ff', desc:'Tireuse bière innovante — remplissage par le fond. Location machine + consommables récurrents.' },
  newcy:   { label:'Newcy PAUSE CAFÉ',color:'#0369a1', bg:'#eff6ff', desc:'Circuit fermé cafétéria : collecte-lave-restitue. Abonnement mensuel.' },
};

function ProdBadge({type, big}) {
  const b = BADGE[type];
  return <span style={{
    display:'inline-flex', alignItems:'center', gap:5,
    background:b.bg, color:b.color, border:`1px solid ${b.color}44`,
    padding: big ? '5px 14px' : '3px 10px',
    borderRadius:20, fontSize: big ? 12 : 10, fontWeight:700,
    whiteSpace:'nowrap'
  }}>
    {type==='service' && '🔄'}
    {type==='vente'   && '🛒'}
    {type==='beerup'  && '🍺'}
    {type==='newcy'   && '☕'}
    {' '}{b.label}
  </span>;
}

/* ─────────────────────────────────────────────
   SIMULATOR COMPONENT
   ─────────────────────────────────────────── */
function Sim({cfg, col}) {
  const [vals, setVals] = React.useState(cfg.map(c=>c.def));
  const result = cfg.reduce((acc,c,i) => acc * vals[i], 1);
  const isService = cfg.some(c=>c.type==='service');
  const comRate = isService ? 0.12 : 0.08;
  const com = Math.round(result * comRate);
  const com48 = isService ? com*4 : com;
  const f = n => n.toLocaleString('fr-FR');
  return (
    <div style={{background:'#0d1f14',borderRadius:12,padding:20,marginTop:12}}>
      <div style={{fontSize:10,color:'#6fca96',fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginBottom:14}}>
        📊 Simulateur — 1 client de cette cible
      </div>
      <div style={{display:'grid',gridTemplateColumns:`repeat(${cfg.length},1fr)`,gap:12,marginBottom:16}}>
        {cfg.map((c,i)=>(
          <div key={i}>
            <div style={{fontSize:10,color:'rgba(255,255,255,0.45)',marginBottom:5}}>{c.label}</div>
            <input type="range" min={c.min} max={c.max} step={c.step||1} value={vals[i]}
              onChange={e=>{const nv=[...vals];nv[i]=+e.target.value;setVals(nv);}}
              style={{width:'100%',accentColor:col}}/>
            <div style={{fontSize:16,fontWeight:800,color:'white',marginTop:3}}>{f(vals[i])}{c.unit||''}</div>
          </div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
        <div style={{background:'rgba(255,255,255,0.05)',borderRadius:8,padding:'10px 12px'}}>
          <div style={{fontSize:9,color:'rgba(255,255,255,0.4)',marginBottom:3}}>CA {isService?'service':'vente'} / an</div>
          <div style={{fontSize:18,fontWeight:900,color:'#6fca96'}}>{f(Math.round(result))}€</div>
        </div>
        <div style={{background:'rgba(255,255,255,0.05)',borderRadius:8,padding:'10px 12px'}}>
          <div style={{fontSize:9,color:'rgba(255,255,255,0.4)',marginBottom:3}}>Votre commission / an</div>
          <div style={{fontSize:18,fontWeight:900,color:'white'}}>{f(com)}€</div>
          <div style={{fontSize:9,color:'rgba(255,255,255,0.3)',marginTop:2}}>{isService?'12%':'8%'} du CA</div>
        </div>
        <div style={{background:col+'33',border:`1px solid ${col}66`,borderRadius:8,padding:'10px 12px'}}>
          <div style={{fontSize:9,color:'rgba(255,255,255,0.6)',marginBottom:3}}>{isService?'Com. sur 48 mois':'Ticket commission'}</div>
          <div style={{fontSize:18,fontWeight:900,color:'white'}}>{f(com48)}€</div>
          {isService && <div style={{fontSize:9,color:'rgba(255,255,255,0.35)',marginTop:2}}>durée contrat standard</div>}
        </div>
      </div>
    </div>
  );
}

      {/* PRODUCT × REASON BLOCK — one per product */}
      {c.produits.map(prod=>(
        <div key={prod} style={{background:'white',border:'1px solid #e0e8ec',borderRadius:12,padding:18,marginBottom:12}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
            <ProdBadge type={prod}/>
            <span style={{fontSize:11,fontWeight:700,color:'#4b6358'}}>{prodStr[prod]}</span>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:10}}>
            {c.pourquoi.map((r,i)=>(
              <div key={i} style={{background:'#f4f7f5',borderRadius:8,padding:'10px 12px',fontSize:12,color:'#374151',lineHeight:1.5}}>
                {r}
              </div>
            ))}
          </div>
        </div>
      ))}

      {/* OBJECTION */}
      <div style={{background:'#fffbeb',borderLeft:'4px solid #f0a500',padding:'12px 16px',marginBottom:4}}>
        <div style={{fontSize:10,fontWeight:700,color:'#92400e',textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>
          💬 Objection fréquente & réponse terrain
        </div>
        <div style={{fontSize:13,fontWeight:700,color:'#92400e',fontStyle:'italic',marginBottom:4}}>"{c.objection.q}"</div>
        <div style={{fontSize:12,color:'#374151',lineHeight:1.6}}>→ {c.objection.r}</div>
      </div>

      {/* SIMULATEUR */}
      <Sim cfg={c.sim} col={c.col}/>
      {c.simNote && (
        <div style={{fontSize:11,color:'rgba(255,255,255,0.0)',background:'#0d1f14',borderRadius:'0 0 12px 12px',padding:'8px 20px',color:'rgba(255,255,255,0.4)',marginTop:-1}}>
          💡 {c.simNote}
        </div>
      )}

      {/* CONTACT */}
      <div style={{marginTop:14,background:'#0d1f14',borderRadius:10,padding:'12px 18px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
        <div style={{fontSize:11,color:'rgba(255,255,255,0.5)'}}>
          Vérifier la dispo de votre zone · Semaine du 18 mai · Formation Lyon
        </div>
        <a href="tel:+33610703090" style={{color:'#f0a500',fontWeight:900,fontSize:18,textDecoration:'none'}}>
          📱 06 10 70 30 90
        </a>
      </div>
    </div>
  );
}
