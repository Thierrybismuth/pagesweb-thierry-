<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Potentiel — Découverte</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:linear-gradient(160deg,#f7f5f0 0%,#fff 100%);min-height:100vh;color:#1a2e44}
.header{background:#1a2e44;padding:13px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.dots{display:flex;gap:5px}
.dot{width:9px;height:9px;border-radius:50%}
.header-title{color:white;font-weight:700;font-size:13px;letter-spacing:.4px;flex:1}
.reset-btn{background:rgba(255,255,255,.12);border:none;color:white;padding:5px 11px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;display:none}
.wrap{max-width:620px;margin:0 auto;padding:24px 16px}
.screen{display:none}
.screen.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card{background:white;border-radius:16px;padding:20px;box-shadow:0 2px 20px rgba(26,46,68,.07);margin-bottom:14px}
.inp{width:100%;padding:11px 14px;border:2px solid #e0ddd8;border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.inp:focus{border-color:#e53935}
select{width:100%;padding:11px 14px;border:2px solid #e0ddd8;border-radius:8px;font-size:14px;font-family:inherit;background:white;outline:none;cursor:pointer}
select:focus{border-color:#e53935}
.btn-main{width:100%;background:#e53935;color:white;border:none;padding:13px;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:18px;transition:background .2s}
.btn-main:disabled{background:#ccc;cursor:not-allowed}
.btn-main:not(:disabled):hover{background:#c62828}
.cible-btn{display:flex;align-items:center;gap:14px;width:100%;background:white;border:2px solid #e0ddd8;border-radius:13px;padding:17px 18px;cursor:pointer;text-align:left;margin-bottom:10px;font-family:inherit;transition:all .2s}
.cible-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.08)}
.q-cible{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.9px;margin-bottom:6px}
.q-text{font-size:17px;font-weight:700;line-height:1.4;margin-bottom:5px}
.q-sub{color:#888;font-size:12px;margin-bottom:14px}
.q-note{color:#fb8c00;font-size:12px;font-style:italic;margin-bottom:14px}
.opt-btn{display:flex;align-items:center;justify-content:space-between;width:100%;background:white;border:2px solid #e0ddd8;border-radius:10px;padding:13px 16px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;margin-bottom:9px;transition:all .2s;text-align:left}
.opt-btn:hover{border-color:#e53935;background:#fff8f8;color:#e53935}
.opt-btn.selected{border-color:#e53935;background:#fff8f8;color:#e53935}
.opt-note{font-size:11px;color:#43a047;font-weight:700}
.activated-badges{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.inp-row{display:flex;gap:10px;align-items:center;margin-bottom:12px}
.inp-suffix{color:#555;font-weight:600;white-space:nowrap;font-size:14px}
.period-btns{display:flex;gap:7px;margin-bottom:13px;flex-wrap:wrap}
.period-btn{padding:5px 11px;border-radius:6px;border:1px solid #ddd;background:white;color:#777;font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s}
.period-btn.active{border-color:#e53935;background:#fff5f5;color:#e53935}
/* NAV BAR */
.nav-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.back-q-btn{background:white;border:2px solid #e0ddd8;color:#1a2e44;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;transition:all .2s}
.back-q-btn:hover{border-color:#1a2e44;background:#f7f5f0}
.back-q-btn:disabled{opacity:.3;cursor:not-allowed}
.step-counter{font-size:12px;color:#aaa;font-weight:500;margin-left:auto}
/* ENSEIGNE CARDS */
.enseigne-card{background:white;border-radius:16px;padding:20px;box-shadow:0 2px 20px rgba(26,46,68,.07);margin-bottom:18px}
.e-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:10px}
.e-name{font-size:18px;font-weight:800}
.e-sub{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;margin-left:7px}
.e-punchline{font-size:13px;color:#666;font-style:italic;margin-top:5px}
.pastille-btn{background:none;border:1px dashed #bbb;padding:5px 11px;border-radius:20px;font-size:11px;cursor:pointer;color:#888;font-family:inherit;transition:all .2s;white-space:nowrap}
.pastille-btn:hover{border-color:#fb8c00;color:#fb8c00}
.arg-card{background:#f9f9f9;border-radius:10px;padding:12px 14px;margin-bottom:10px}
.arg-title{font-weight:700;font-size:13px;margin-bottom:5px}
.arg-client{font-size:13px;color:#333;line-height:1.6}
.arg-pastille{background:#fff9c4;border:1px solid #fdd835;border-radius:7px;padding:9px 11px;margin-top:9px;display:none}
.arg-pastille.show{display:block}
.pastille-label{font-size:10px;font-weight:800;color:#f57f17;text-transform:uppercase;letter-spacing:.5px}
.pastille-text{font-size:12px;color:#555;margin-top:4px;line-height:1.5}
.cta-box{border-radius:10px;padding:14px;margin-top:4px}
.cta-title{font-weight:700;font-size:13px;margin-bottom:12px;color:#1a2e44}
.cta-field{margin-bottom:10px}
.cta-field label{display:block;font-size:11px;font-weight:700;color:#666;margin-bottom:4px}
.cta-contract{font-size:11px;color:#999;font-style:italic;margin-bottom:11px}
.cta-submit-row{display:flex;align-items:center;gap:10px}
.cta-submit{flex:1;color:white;border:none;padding:11px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.cta-commission{font-size:11px;color:#888;font-weight:700;white-space:nowrap;display:none}
.cta-success{background:#e8f5e9;border-radius:10px;padding:15px;text-align:center}
.sim-card{background:linear-gradient(135deg,#fffde7,#fff);border:2px solid #fdd835;border-radius:16px;padding:18px;margin-bottom:16px}
.sim-label{font-size:11px;font-weight:800;color:#f9a825;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.sim-nums{display:flex;gap:28px;flex-wrap:wrap}
.sim-num{font-size:26px;font-weight:800}
.sim-sub{font-size:11px;color:#888;margin-top:2px}
.back-btn{background:none;border:2px solid #e0ddd8;color:#1a2e44;padding:10px 22px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:block;margin:8px auto 0}
</style>
</head>
<body>
<div class="header">
  <div class="dots">
    <div class="dot" style="background:#e53935"></div>
    <div class="dot" style="background:#fdd835"></div>
    <div class="dot" style="background:#fb8c00"></div>
    <div class="dot" style="background:#1e88e5"></div>
  </div>
  <span class="header-title">MULTI-POTENTIEL — Découverte consultant</span>
  <button class="reset-btn" id="resetBtn" onclick="reset()">↺ Nouvelle session</button>
</div>

<div class="wrap">
  <!-- CONSULTANT -->
  <div class="screen active" id="s-consultant">
    <div style="text-align:center;margin-bottom:26px">
      <div style="font-size:38px;margin-bottom:10px">🎯</div>
      <h1 style="font-size:22px;font-weight:800;margin-bottom:8px">Découverte Multi-Potentiel</h1>
      <p style="color:#777;font-size:14px;line-height:1.6">Identifiez les solutions applicables à votre contact en quelques questions.</p>
    </div>
    <div class="card">
      <p style="font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.9px;margin-bottom:14px">👤 Vos informations</p>
      <div style="display:flex;flex-direction:column;gap:13px">
        <div>
          <label style="display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:5px">Votre nom (consultant)</label>
          <input class="inp" id="consultantNom" placeholder="Prénom Nom" oninput="checkConsultant()">
        </div>
        <div>
          <label style="display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:5px">Votre email (consultant)</label>
          <input class="inp" id="consultantEmail" type="email" placeholder="prenom@email.fr" oninput="checkConsultant()">
        </div>
      </div>
      <button class="btn-main" id="startBtn" disabled onclick="goToCible()">Démarrer la découverte →</button>
    </div>
  </div>

  <!-- CIBLE -->
  <div class="screen" id="s-cible">
    <div style="margin-bottom:20px">
      <h2 style="font-size:20px;font-weight:800;margin-bottom:5px" id="cibleGreet"></h2>
      <p style="color:#666;font-size:14px">Quel type de contact avez-vous en face de vous ?</p>
    </div>
    <button class="cible-btn" onclick="startFlow('particuliers')" onmouseenter="this.style.borderColor='#1e88e5'" onmouseleave="this.style.borderColor='#e0ddd8'">
      <span style="font-size:26px">🏠</span>
      <div><div style="font-weight:700;font-size:14px">Particulier</div><div style="color:#888;font-size:12px;margin-top:2px">Propriétaire, acheteur, emprunteur</div></div>
      <span style="margin-left:auto;color:#ccc;font-size:18px">→</span>
    </button>
    <button class="cible-btn" onclick="startFlow('commercants')" onmouseenter="this.style.borderColor='#fb8c00'" onmouseleave="this.style.borderColor='#e0ddd8'">
      <span style="font-size:26px">🏪</span>
      <div><div style="font-weight:700;font-size:14px">Commerçant / Artisan / TPE</div><div style="color:#888;font-size:12px;margin-top:2px">Exploitant d'un fonds de commerce</div></div>
      <span style="margin-left:auto;color:#ccc;font-size:18px">→</span>
    </button>
    <button class="cible-btn" onclick="startFlow('grandes_entreprises')" onmouseenter="this.style.borderColor='#e53935'" onmouseleave="this.style.borderColor='#e0ddd8'">
      <span style="font-size:26px">🏢</span>
      <div><div style="font-weight:700;font-size:14px">Grande entreprise</div><div style="color:#888;font-size:12px;margin-top:2px">Structure avec salariés et/ou grands locaux</div></div>
      <span style="margin-left:auto;color:#ccc;font-size:18px">→</span>
    </button>
  </div>

  <!-- QUESTIONS -->
  <div class="screen" id="s-questions">
    <div class="nav-bar">
      <button class="back-q-btn" id="backQBtn" onclick="goBack()" disabled>← Retour</button>
      <button class="back-q-btn" onclick="goToCible()" style="border-color:#e0ddd8;color:#888">Changer de cible</button>
      <span class="step-counter" id="stepCounter"></span>
    </div>
    <div id="activated-badges" class="activated-badges"></div>
    <div class="card">
      <div class="q-cible" id="q-cible-label"></div>
      <div class="q-text" id="q-text"></div>
      <div class="q-sub" id="q-sub" style="display:none"></div>
      <div class="q-note" id="q-note" style="display:none"></div>
      <div id="q-options"></div>
      <div id="q-input" style="display:none">
        <div class="inp-row">
          <input class="inp" id="q-inp-val" placeholder="" style="flex:1" oninput="checkInputBtn()" onkeydown="if(event.key==='Enter')submitInput()">
          <span class="inp-suffix" id="q-inp-suffix"></span>
        </div>
        <div id="q-periods" class="period-btns"></div>
        <button class="btn-main" id="q-inp-btn" disabled onclick="submitInput()" style="margin-top:0">Continuer →</button>
      </div>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="screen" id="s-results">
    <div style="margin-bottom:18px">
      <div style="font-size:20px;font-weight:800;margin-bottom:5px" id="results-title"></div>
      <div style="color:#777;font-size:13px" id="results-sub"></div>
    </div>
    <div id="sim-apc"></div>
    <div id="results-list"></div>
    <button class="back-btn" id="back-to-q-btn" onclick="goBackToQuestions()" style="display:none;margin-bottom:10px">← Corriger une réponse</button>
    <button class="back-btn" onclick="goToCible()" style="display:none" id="new-contact-btn">← Nouveau contact</button>
  </div>
</div>

<script>
const ENSEIGNES = {
  KW_ACHETEUR:{name:'KW',subtitle:'Acheteur',color:'#1e88e5',commission:'8% de la commission KW',email:'test@kw.fr',punchline:'Avec KW, vous avez un interlocuteur et une équipe de 30.',
    args:[{title:"L'écosystème",client:"Un BC KW réunit sous un même toit l'agent immobilier, un courtier crédit, un courtier travaux et des partenaires déménagement.",consultant:"Agent immobilier, courtier crédit, courtier travaux, déménagement — tous déjà dans le réseau. Le client n'a pas à chercher après signature."},
    {title:"La puissance collective",client:"Un BC KW, c'est 20 à 50 négociateurs qui cherchent en parallèle pour vous — dont certains ont des biens en off market.",consultant:"Vs une agence classique : 4-5 négociateurs. KW en a 30 sur le même secteur qui travaillent dès le premier jour."}],
    ctaLabel:"Je veux être mis en contact avec un conseiller KW",ctaFields:[]},
  KW_VENDEUR:{name:'KW',subtitle:'Vendeur',color:'#1565c0',commission:'8% de la commission KW',email:'test@kw.fr',punchline:'KW valorise votre bien avec la puissance du réseau.',
    args:[{title:"La puissance du réseau",client:"KW dispose de 20 à 50 négociateurs actifs sur votre secteur pour maximiser la visibilité de votre bien.",consultant:"Arguments terrain à préciser — en attente d'informations complémentaires."}],
    ctaLabel:"Je veux estimer mon bien avec KW",ctaFields:[]},
  APC:{name:'APC',subtitle:'Assurément Pas Cher',color:'#fb8c00',commission:'~500€ par contrat renégocié',email:'test@apc.fr',punchline:null,
    args:[{title:"Votre banque joue contre vous",client:"Votre banque baisse ses taux de crédit et se rattrape discrètement sur votre assurance emprunteur. 90% des emprunteurs ne le voient pas.",consultant:"Les banques compriment leurs marges sur le crédit et compensent en gonflant l'assurance. C'est légal, discret, très efficace."},
    {title:"La loi vous protège",client:"La loi Lemoine (2022) interdit toute perte de protection. Vous changez d'assurance, vous gardez au minimum les mêmes garanties.",consultant:"APC travaille avec AXA, Generali, Allianz. Résiliation à tout moment depuis 2022."},
    {title:"Un humain qui s'occupe de tout",client:"Pas de plateforme à remplir seul. Un interlocuteur dédié qui pilote votre dossier de A à Z.",consultant:"Contre les solutions 100% digitales sans accompagnement humain."}],
    ctaLabel:"Je veux qu'on analyse mon assurance",ctaFields:[]},
  LAV_PART:{name:'LAV',subtitle:'Les Artisans Verts',color:'#43a047',commission:'7% du chantier (1 000€ – 2 000€)',email:'test@lav.fr',punchline:'6 000 chantiers réalisés. Pas une promesse — un bilan.',
    args:[{title:"10 ans et 6 000 chantiers",client:"6 000 chantiers réalisés sur 10 ans — particuliers, grands industriels, bâtiments publics.",consultant:"Si les grandes entreprises leur font confiance pour leurs entrepôts et usines, c'est que la qualité est au rendez-vous."},
    {title:"Tout en interne, rien de délégué",client:"LAV commercialise, achète le matériel, pose et gère les aides. Un seul interlocuteur, aucune sous-traitance.",consultant:"LAV maîtrise toute la chaîne. Zéro artisan local inconnu sous-traité."},
    {title:"Zéro reste à charge garanti",client:"Le devis est toujours à zéro reste à charge. Pas d'option cachée, pas de surprise.",consultant:"S'engage sur zéro RAC avant tout démarrage. Options hors CEE chiffrées séparément."},
    {title:"Et si le client veut aller plus loin ?",client:"Des conditions de crédit négociées avec les grandes banques, impossibles à obtenir seul.",consultant:"Accords cadres bancaires pour les travaux hors CEE."}],
    ctaLabel:"Je veux un diagnostic gratuit",ctaFields:[]},
  RECOMMERCER:{name:'RecommerCer',subtitle:'Reconversion commerciale',color:'#8e24aa',commission:"12% du droit d'entrée",email:'test@recommercer.fr',punchline:null,
    args:[{title:"Une légitimité unique",client:"Membre du Collège des Experts de la Fédération Française de la Franchise. Pas un courtier — un expert reconnu.",consultant:"Structure reconnue par la FFF. Audite et analyse chaque enseigne avant de la proposer."},
    {title:"500 enseignes auditées",client:"500 enseignes sérieuses, toutes auditées. Pas une liste — une sélection.",consultant:"Solidité financière, modèle éco, conditions franchisé analysés. Rien au hasard."},
    {title:"C'est eux qui viennent vers vous",client:"On soumet votre localisation aux enseignes. Vous choisissez parmi les 3 à 5 meilleures propositions.",consultant:"Notre équipe contacte directement les enseignes avec votre profil et localisation."},
    {title:"Gratuit pour vous",client:"Notre intervention est gratuite. C'est l'enseigne qui paie — pas vous.",consultant:"RecommerCer est rémunéré par les enseignes. Zéro risque financier."},
    {title:"On vous accompagne jusqu'au bout",client:"On négocie avec l'enseigne, on monte le financement, on recrute si besoin, on booste l'ouverture.",consultant:"Accompagnement complet : négociation, financement, recrutement via ConvoK, boost via PerDus."}],
    ctaLabel:"Je veux que vous contactiez des enseignes pour mon profil",
    ctaFields:[{id:'surface',label:'Surface du local (m²)',type:'number',placeholder:'80'},{id:'budget',label:'Budget',type:'select',options:['< 10 000€','10 000 – 30 000€','30 000 – 50 000€','> 50 000€']},{id:'horizon',label:'Horizon envisagé',type:'select',options:['Prochain trimestre','Prochain semestre',"Dans l'année",'Dans 2 ans']},{id:'univers',label:'Univers qui vous attirent',type:'text',placeholder:'Restauration, services à la personne...'}]},
  CONVOK:{name:'ConvoK',subtitle:'Recrutement IA',color:'#00acc1',commission:'1 000€ par recrutement signé',email:'test@convok.fr',punchline:null,
    args:[{title:"Le marché se contredit",client:"50% des patrons galent à recruter. Presque aucun ne veut payer un cabinet. Résultat : le poste reste vide des mois.",consultant:"Cabinets : 15-25% du salaire annuel = 6 000€ pour un poste à 40K€. ConvoK casse ce cercle vicieux."},
    {title:"La valeur, c'est pas les CV",client:"LinkedIn et Indeed vous donnent des CV. ConvoK vous met des candidats en face de vous.",consultant:"Ce qu'il ne sait pas faire : contacter massivement, relancer mail/SMS/WhatsApp."},
    {title:"Simple, rapide, sans risque",client:"3 critères de votre part. 4 à 6 candidats devant vous en 8 jours. Vous ne payez que si vous recrutez.",consultant:"Forfait 2 000€ uniquement à l'embauche. Patron donne : métier + localisation + 1-2 critères."}],
    ctaLabel:"Je veux lancer un recrutement ConvoK",
    ctaFields:[{id:'poste',label:'Intitulé du poste',type:'text',placeholder:'Responsable de secteur'},{id:'localisation',label:'Localisation',type:'text',placeholder:'Lyon 3e'},{id:'criteres',label:'Critères complémentaires',type:'text',placeholder:'Permis B...'},{id:'date',label:'Date souhaitée',type:'text',placeholder:'Semaine du 14 avril'}],
    contractNote:"ConvoK est une prestation simple et transparente. Ce formulaire tient lieu de document contractuel."},
  PERDUS:{name:'PerDus',subtitle:'Colis perdus en boutique',color:'#e53935',commission:'8€/kg vendu',email:'test@perdus.fr',punchline:null,
    args:[{title:"Un marché colossal",client:"8 à 10% du commerce se fait sur internet. 5% de ces colis ne sont jamais livrés. C'est un stock énorme — disponible.",consultant:"PerDus rachète auprès d'Amazon, La Poste, grands transporteurs. Le commerçant n'achète rien, ne stocke rien, ne risque rien."},
    {title:"48h qui changent votre visibilité",client:"Une semaine de communication gratuite autour de chez vous : posts réseaux sociaux, flyers distribués dans la rue la veille par le consultant, flyers remis à votre clientèle pendant toute la semaine précédant l'événement. 2 jours de flux inhabituel dans votre boutique.",consultant:"Le consultant gère la diffusion rue + réseaux. Le commerçant distribue les flyers en boutique toute la semaine avant. Stand 25-100 kg selon espace disponible."},
    {title:"Trois bénéfices directs",client:"Communication offerte. Nouveaux clients qui découvrent votre boutique. Certains repartent avec un produit à vous.",consultant:"1. Comm' offerte 2. Visiteurs convertibles 3. Habitants qui découvrent le commerce."}],
    ctaLabel:"Je veux organiser un événement PerDus",
    ctaFields:[{id:'surface',label:'Surface disponible (m²)',type:'number',placeholder:'30'},{id:'espace',label:"Type d'espace",type:'select',options:['Intérieur','Extérieur','Les deux']},{id:'date',label:'Date souhaitée',type:'text',placeholder:'Samedi 10 mai'}]},
  CONVOK_GE:{name:'ConvoK',subtitle:'Grands Comptes',color:'#00838f',commission:'50% du CA',email:'test@convok.fr',punchline:null,
    args:[{title:"Vos RH gèrent les dossiers",client:"Vos RH gèrent les dossiers. Personne ne gère les candidats.",consultant:"ConvoK livre 4-6 candidats qualifiés en 8 jours. Postes récurrents uniquement (pas C-levels)."},
    {title:"-80% vs un cabinet de chasse",client:"-80% vs un cabinet de chasse classique. ConvoK à 2 000€ forfait. Même résultat, sans le ticket d'entrée.",consultant:"Cabinets de chasse : 15-25% du salaire annuel. ConvoK = 2 000€ à l'embauche uniquement."},
    {title:"Simple, rapide, sans risque",client:"3 critères de votre part. 4 à 6 candidats en 8 jours. Vous ne payez que si vous recrutez.",consultant:"Identique TPE : 3 critères → 8 jours → 2 000€ à l'embauche."}],
    ctaLabel:"Je veux lancer un recrutement ConvoK",
    ctaFields:[{id:'poste',label:'Intitulé du poste',type:'text',placeholder:'Technicien terrain'},{id:'localisation',label:'Localisation',type:'text',placeholder:'Paris 15e'},{id:'criteres',label:'Critères complémentaires',type:'text',placeholder:'Habilitations électriques...'},{id:'date',label:'Date souhaitée',type:'text',placeholder:'Semaine du 21 avril'}],

// ─── STATE ───
let state = {
  consultant:{nom:'',email:''},
  cible:null, currentQ:null,
  answers:{}, activated:[],
  pastilleShown:{}, ctaForms:{}, ctaSubmitted:{},
  inputPeriod:'par an',
  history:[] // [{qId, answers_snapshot, activated_snapshot}]
};

// ─── UTILS ───
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('resetBtn').style.display=id==='s-consultant'?'none':'block';
  window.scrollTo(0,0);
}

function checkConsultant(){
  const n=document.getElementById('consultantNom').value;
  const e=document.getElementById('consultantEmail').value;
  document.getElementById('startBtn').disabled=!(n&&e);
}

function goToCible(){
  state.consultant.nom=document.getElementById('consultantNom').value||state.consultant.nom;
  state.consultant.email=document.getElementById('consultantEmail').value||state.consultant.email;
  document.getElementById('cibleGreet').textContent='Bonjour, '+state.consultant.nom+' 👋';
  state.activated=[];state.answers={};state.pastilleShown={};state.ctaForms={};state.ctaSubmitted={};state.history=[];
  show('s-cible');
}

function startFlow(cible){
  state.cible=cible;state.currentQ=FLOWS[cible].start;
  state.activated=[];state.answers={};state.history=[];
  const labels={particuliers:'Particulier',commercants:'Commerçant / TPE',grandes_entreprises:'Grande Entreprise'};
  document.getElementById('q-cible-label').textContent=labels[cible];
  renderQuestion();
  show('s-questions');
}

// ─── BACK NAVIGATION ───
function pushHistory(){
  state.history.push({
    qId: state.currentQ,
    answers: JSON.parse(JSON.stringify(state.answers)),
    activated: [...state.activated],
    inputPeriod: state.inputPeriod
  });
}

function goBack(){
  if(state.history.length===0)return;
  const prev=state.history.pop();
  state.currentQ=prev.qId;
  state.answers=prev.answers;
  state.activated=prev.activated;
  state.inputPeriod=prev.inputPeriod;
  renderQuestion();
}

function goBackToQuestions(){
  // Return to last question in history
  if(state.history.length>0){
    const last=state.history[state.history.length-1];
    state.currentQ=last.qId;
    // Restore state to before that last question was answered
    const prev=state.history.pop();
    state.currentQ=prev.qId;
    state.answers=prev.answers;
    state.activated=prev.activated;
    state.inputPeriod=prev.inputPeriod;
  }
  renderQuestion();
  show('s-questions');
}

// ─── RENDER QUESTION ───
function renderQuestion(){
  const flow=FLOWS[state.cible];
  const q=flow.questions[state.currentQ];
  // Badges
  const badges=document.getElementById('activated-badges');
  badges.innerHTML=state.activated.map(k=>{
    const e=ENSEIGNES[k];
    return`<span class="badge" style="background:${e.color}18;color:${e.color}">✅ ${e.name}</span>`;
  }).join('');
  // Question
  document.getElementById('q-text').textContent=q.text;
  const sub=document.getElementById('q-sub');sub.textContent=q.sub||'';sub.style.display=q.sub?'block':'none';
  const note=document.getElementById('q-note');note.textContent=q.note||'';note.style.display=q.note?'block':'none';
  // Step counter
  document.getElementById('stepCounter').textContent=`Étape ${state.history.length+1}`;
  // Back button
  document.getElementById('backQBtn').disabled=state.history.length===0;
  // Render options or input
  const opts=document.getElementById('q-options');
  const inp=document.getElementById('q-input');
  if(q.type==='input'){
    opts.style.display='none';inp.style.display='block';
    const savedVal=state.answers[state.currentQ]||'';
    const inpEl=document.getElementById('q-inp-val');
    inpEl.value=savedVal;
    inpEl.placeholder=q.placeholder||'';
    inpEl.type=q.inputType||'text';
    document.getElementById('q-inp-suffix').textContent=q.inputSuffix||'';
    document.getElementById('q-inp-btn').disabled=!savedVal;
    const periods=document.getElementById('q-periods');
    if(q.inputPeriods){
      periods.innerHTML=q.inputPeriods.map(p=>`<button class="period-btn${p===state.inputPeriod?' active':''}" onclick="setPeriod('${p}')">${p}</button>`).join('');
    } else periods.innerHTML='';
  } else {
    inp.style.display='none';opts.style.display='block';
    const savedAns=state.answers[state.currentQ];
    opts.innerHTML=q.options.map((o,i)=>`
      <button class="opt-btn${savedAns===o.label?' selected':''}" onclick="handleAnswer(${i})">
        <span>${o.label}</span>
        ${o.note?`<span class="opt-note">${o.note}</span>`:''}
      </button>`).join('');
  }
}

function setPeriod(p){
  state.inputPeriod=p;
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.toggle('active',b.textContent===p));
}

function checkInputBtn(){
  document.getElementById('q-inp-btn').disabled=!document.getElementById('q-inp-val').value;
}

function activateEnseignes(list){
  if(!list)return;
  list.forEach(k=>{if(!state.activated.includes(k))state.activated.push(k);});
}

function handleAnswer(i){
  const q=FLOWS[state.cible].questions[state.currentQ];
  const opt=q.options[i];
  pushHistory();
  state.answers[state.currentQ]=opt.label;
  activateEnseignes(opt.activate);
  if(opt.next==='EXIT'||opt.next==='END')showResults();
  else{state.currentQ=opt.next;renderQuestion();}
}

function submitInput(){
  const val=document.getElementById('q-inp-val').value;
  if(!val)return;
  const q=FLOWS[state.cible].questions[state.currentQ];
  pushHistory();
  state.answers[state.currentQ]=val;
  state.answers[state.currentQ+'_period']=state.inputPeriod;
  activateEnseignes(q.activate);
  if(q.next==='END')showResults();
  else{state.currentQ=q.next;renderQuestion();}
}

// ─── RESULTS ───
function calcAPC(mensualite,anneesLabel){
  if(!mensualite)return null;
  const annees=anneesLabel==='Moins de 5 ans'?3:10;
  const ecoAnnuelle=Math.round(parseFloat(mensualite)*annees*12*0.004*0.40);
  return{ecoAnnuelle,ecoTotale:Math.round(ecoAnnuelle*annees),annees};
}

function showResults(){
  const count=state.activated.length;
  document.getElementById('results-title').textContent=count===0?'😕 Aucune enseigne activée':`🎉 ${count} enseigne${count>1?'s':''} identifiée${count>1?'s':''}`;
  document.getElementById('results-sub').textContent=count===0?'Ce profil ne correspond à aucune enseigne MP.':'Argumentaires et CTAs pour chaque solution. Activez 👁 Consultant pour les pastilles.';
  const simEl=document.getElementById('sim-apc');
  if(state.activated.includes('APC')&&state.answers.Q5B){
    const s=calcAPC(state.answers.Q5B,state.answers.Q5A);
    if(s)simEl.innerHTML=`<div class="sim-card"><div class="sim-label">💰 Simulation APC</div><div class="sim-nums"><div><div class="sim-num">${s.ecoAnnuelle.toLocaleString('fr-FR')} €</div><div class="sim-sub">économie / an estimée</div></div><div><div class="sim-num" style="color:#43a047">${s.ecoTotale.toLocaleString('fr-FR')} €</div><div class="sim-sub">économie sur ${s.annees} ans</div></div></div><div style="font-size:11px;color:#bbb;margin-top:8px">Estimation : taux 0,4% · économie APC 40%</div></div>`;
  } else simEl.innerHTML='';
  const list=document.getElementById('results-list');
  if(count===0){
    list.innerHTML=`<div class="card" style="text-align:center;padding:36px 20px"><p style="color:#aaa;margin-bottom:18px;font-size:14px">Essayez avec un autre profil.</p><button class="btn-main" style="width:auto;padding:11px 22px;margin:0 auto;display:block" onclick="goToCible()">← Changer de cible</button></div>`;
  } else {
    list.innerHTML=state.activated.map(k=>renderCard(k)).join('');
  }
  document.getElementById('back-to-q-btn').style.display=state.history.length>0?'block':'none';
  document.getElementById('new-contact-btn').style.display=count>0?'block':'none';
  show('s-results');
}

function renderCard(key){
  const e=ENSEIGNES[key];
  const args=e.args.map((a,i)=>`
    <div class="arg-card">
      <div class="arg-title" style="color:${e.color}">${a.title}</div>
      <div class="arg-client">${a.client}</div>
      <div class="arg-pastille" id="p-${key}-${i}">
        <div class="pastille-label">📌 Pastille consultant</div>
        <div class="pastille-text">${a.consultant}</div>
      </div>
    </div>`).join('');
  const fields=e.ctaFields.map(f=>{
    if(f.type==='select'){
      const opts=f.options.map(o=>`<option>${o}</option>`).join('');
      return`<div class="cta-field"><label>${f.label}</label><select id="cf-${key}-${f.id}" onchange="updateForm('${key}','${f.id}',this.value)"><option value="">Sélectionner...</option>${opts}</select></div>`;
    }
    return`<div class="cta-field"><label>${f.label}</label><input class="inp" id="cf-${key}-${f.id}" type="${f.type}" placeholder="${f.placeholder}" oninput="updateForm('${key}','${f.id}',this.value)"></div>`;
  }).join('');
  const note=e.contractNote?`<div class="cta-contract">${e.contractNote}</div>`:'';
  return`<div class="enseigne-card" style="border-top:4px solid ${e.color}">
    <div class="e-header">
      <div>
        <div style="display:flex;align-items:center;flex-wrap:wrap">
          <span class="e-name" style="color:${e.color}">${e.name}</span>
          <span class="e-sub" style="background:${e.color}18;color:${e.color}">${e.subtitle}</span>
        </div>
        ${e.punchline?`<div class="e-punchline">"${e.punchline}"</div>`:''}
      </div>
      <button class="pastille-btn" id="pbtn-${key}" onclick="togglePastille('${key}')">👁 Consultant</button>
    </div>
    ${args}
    <div class="cta-box" id="cta-${key}" style="background:${e.color}08;border:1px solid ${e.color}25">
      <div class="cta-title">📩 ${e.ctaLabel}</div>
      ${fields}${note}
      <div class="cta-submit-row">
        <button class="cta-submit" style="background:${e.color}" onclick="submitCTA('${key}')">Envoyer la demande →</button>
        <span class="cta-commission" id="comm-${key}">💰 ${e.commission}</span>
      </div>
    </div>
  </div>`;
}

function togglePastille(key){
  state.pastilleShown[key]=!state.pastilleShown[key];
  const show=state.pastilleShown[key];
  document.getElementById('pbtn-'+key).textContent=show?'🔒 Masquer':'👁 Consultant';
  ENSEIGNES[key].args.forEach((_,i)=>{
    const el=document.getElementById(`p-${key}-${i}`);
    if(el)el.classList.toggle('show',show);
  });
  const c=document.getElementById('comm-'+key);
  if(c)c.style.display=show?'inline':'none';
}

function updateForm(key,field,val){
  if(!state.ctaForms[key])state.ctaForms[key]={};
  state.ctaForms[key][field]=val;
}

function submitCTA(key){
  const e=ENSEIGNES[key];
  const fields=state.ctaForms[key]||{};
  const fieldLines=e.ctaFields.map(f=>'<b>'+f.label+'</b> : '+(fields[f.id]||'—')).join('<br>');
  const subject='[Multi-Potentiel] Demande '+e.name+' — '+state.consultant.nom;
  const message='<h2>Demande '+e.name+' ('+e.subtitle+')</h2>'
    +'<p><b>Consultant :</b> '+state.consultant.nom+' ('+state.consultant.email+')</p>'
    +(fieldLines?'<hr><p>'+fieldLines+'</p>':'')
    +'<hr><p style="color:#888;font-size:12px">Envoyé depuis l\'outil découverte Multi-Potentiel</p>';
  const box=document.getElementById('cta-'+key);
  box.innerHTML='<div class="cta-success"><div style="font-size:18px;margin-bottom:4px">⏳</div><div style="font-weight:700;font-size:13px;color:#1565c0">Envoi en cours...</div></div>';
  fetch('https://thierryb.app.n8n.cloud/webhook/5df73b8d-5d5d-4140-9806-71849445d79b',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({mail:'thierry@thierrybismuth.com',subject:subject,message:message})
  }).then(()=>{
    box.innerHTML='<div class="cta-success"><div style="font-size:18px;margin-bottom:4px">✅</div><div style="font-weight:700;font-size:13px;color:#2e7d32">Demande envoyée</div><div style="font-size:11px;color:#666;margin-top:4px">Email envoyé à thierry@thierrybismuth.com</div></div>';
  }).catch(()=>{
    box.innerHTML='<div class="cta-success" style="background:#fff3e0"><div style="font-size:18px;margin-bottom:4px">⚠️</div><div style="font-weight:700;font-size:13px;color:#e65100">Erreur d\'envoi</div><div style="font-size:11px;color:#666;margin-top:4px">Vérifiez votre connexion et réessayez.</div></div>';
  });
}

function reset(){
  state={consultant:{nom:'',email:''},cible:null,currentQ:null,answers:{},activated:[],pastilleShown:{},ctaForms:{},ctaSubmitted:{},inputPeriod:'par an',history:[]};
  document.getElementById('consultantNom').value='';
  document.getElementById('consultantEmail').value='';
  document.getElementById('startBtn').disabled=true;
  show('s-consultant');
}
</script>
