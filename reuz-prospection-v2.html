/* ============================================================
   SIMULATION LOGIQUE
   - Achat : 0,50eu/gob (correction : c'est 0,30eu mais la note dit 0,50eu)
   - Service rotation : 0,20eu/gob/rotation
   - Multiplicateur STOCK : client achete 4-5x le nb de participants
     (meme s'il peut laver : delai lavage + pertes + anticipation)
============================================================ */

function SimGenerique() {
  const [participants, setParticipants] = React.useState(10000);
  const [rotations, setRotations] = React.useState(20);
  const [multiplicateur, setMultiplicateur] = React.useState(5);
  const [mode, setMode] = React.useState("achat"); // "achat" ou "service"
  const fmt = n => Math.round(n).toLocaleString("fr-FR");

  // ACHAT : client avec plonge → stock ×5 × 0,30€ · com 8% · one-shot
  const stockCmd = participants * multiplicateur;
  const caAchat = stockCmd * 0.30;
  const comAchat = caAchat * 0.08;

  // SERVICE : client sans plonge → 0 achat · 0,20€/gob/rotation · com 12%/an
  const caService = participants * rotations * 0.20;
  const comService = caService * 0.12;
  const com48 = comService * 4;

  const isAchat = mode === "achat";

  return (
    <div style={{background:"#111c14",color:"white",borderRadius:14,padding:22}}>
      <div style={{fontSize:10,color:"#6fca96",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Simulateur commercial</div>

      {/* Toggle achat / service */}
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        <button onClick={()=>setMode("achat")} style={{
          flex:1,padding:"8px 0",borderRadius:7,border:"none",cursor:"pointer",fontFamily:"inherit",
          fontWeight:700,fontSize:12,
          background:isAchat?"#f0a500":"rgba(255,255,255,0.08)",
          color:isAchat?"#0d3340":"rgba(255,255,255,0.5)"
        }}>🥤 Achat (client avec plonge)</button>
        <button onClick={()=>setMode("service")} style={{
          flex:1,padding:"8px 0",borderRadius:7,border:"none",cursor:"pointer",fontFamily:"inherit",
          fontWeight:700,fontSize:12,
          background:!isAchat?"#1a6b3a":"rgba(255,255,255,0.08)",
          color:!isAchat?"white":"rgba(255,255,255,0.5)"
        }}>★ Service rotation (sans plonge)</button>
      </div>

      <div style={{background:"rgba(255,255,255,0.05)",borderRadius:8,padding:"8px 12px",marginBottom:14,fontSize:11,color:"rgba(255,255,255,0.65)",lineHeight:1.5}}>
        {isAchat
          ? "Le client lave lui-même ses gobelets. Il achète un stock × 5 pour couvrir l'année (rotation lavage + pertes + sécurité). Commission 8% one-shot, renouvelée chaque année."
          : "Le client n'a pas de plonge. Il ne rachète rien. Re-uz livre, lave, récupère. Facturation 0,20€/gob/rotation. Commission 12%/an récurrente sur 48 mois."}
        <div style={{marginTop:8,background:"rgba(240,165,0,0.1)",border:"1px solid rgba(240,165,0,0.3)",borderRadius:8,padding:"9px 12px",fontSize:10,lineHeight:1.6,color:"rgba(255,255,255,0.75)"}}>
          <strong style={{color:"#f0a500"}}>Exemple réel — Zénith Paris (6 300 places)</strong><br/>
          <span style={{color:"rgba(255,255,255,0.5)"}}>Achat :</span> 6 300 × 5 × 0,30€ = <strong style={{color:"white"}}>9 450€</strong> · com 8% = <strong style={{color:"#f0a500"}}>756€</strong> one-shot<br/>
          <span style={{color:"rgba(255,255,255,0.5)"}}>Service :</span> 6 300 × 120 concerts × 0,20€ = <strong style={{color:"white"}}>151 200€/an</strong> · com 12% = <strong style={{color:"#6fca96"}}>18 144€/an · 72 576€ sur 48 mois</strong><br/>
          <span style={{color:"#f0a500",fontWeight:700}}>→ Le service rapporte 95× plus que l'achat sur la durée du contrat.</span>
        </div>
      </div>

        {isAchat ? (

            <div style={{fontSize:10,color:"rgba(255,255,255,0.45)",marginBottom:4}}>Multiplicateur stock (×5 recommandé)</div>

          </div>
        ) : (
          <div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.45)",marginBottom:4}}>Rotations / an</div>
            <input type="range" min={1} max={365} step={1} value={rotations} onChange={e=>setRotations(+e.target.value)} style={{width:"100%",accentColor:"#1a6b3a"}}/>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>

            <div style={{fontSize:9,color:"rgba(255,255,255,0.4)",marginTop:2}}>one-shot · renouvelé chaque année</div>
          </div>
        </div>
      ) : (
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
          <div style={{background:"rgba(255,255,255,0.06)",borderRadius:10,padding:"12px 14px"}}>
            <div style={{fontSize:9,color:"rgba(255,255,255,0.4)",marginBottom:3}}>CA service / an</div>
            <div style={{fontSize:20,fontWeight:800,color:"#6fca96"}}>{fmt(caService)}€</div>
            <div style={{fontSize:9,color:"rgba(255,255,255,0.3)",marginTop:2}}>{fmt(participants)} × {rotations} × 0,20€</div>
          </div>
          <div style={{background:"rgba(255,255,255,0.06)",borderRadius:10,padding:"12px 14px"}}>
            <div style={{fontSize:9,color:"rgba(255,255,255,0.4)",marginBottom:3}}>Votre com / an (12%)</div>
            <div style={{fontSize:20,fontWeight:800,color:"white"}}>{fmt(comService)}€</div>
            <div style={{fontSize:9,color:"rgba(255,255,255,0.3)",marginTop:2}}>récurrente tant que membre actif</div>

            <div style={{fontSize:9,color:"#6fca96",marginBottom:3}}>Sur 48 mois</div>
            <div style={{fontSize:20,fontWeight:800,color:"white"}}>{fmt(com48)}€</div>

          </div>
        </div>
      )}
    </div>

          {[
            {i:"🍺",t:"Beer Up",d:"Tireuse bière brevetée. Remplissage par le fond. Nouveau segment CHR, campings, hôtellerie plein air. Cashless intégré."},

    </div>

}
