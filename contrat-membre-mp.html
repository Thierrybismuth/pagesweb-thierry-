<!DOCTYPE html>

<head>

<title>Contrat d'adhésion Membre – Multi-Potentiel</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #fef9f0; color: #1a1a2e; }
  .header { padding: 40px 40px 24px; border-bottom: 1px solid rgba(0,0,0,0.08); }

  .header h1 { font-family: 'Syne', sans-serif; font-size: clamp(1.4rem, 3vw, 2rem); font-weight: 800; color: #1a1a2e; margin-bottom: 8px; }
  .header p { font-size: 0.9rem; color: #6b7280; max-width: 560px; line-height: 1.6; }
  .frame-wrap { padding: 32px 40px; }
  iframe { width: 100%; height: 900px; border: none; border-top: 3px solid #1a1a2e; display: block; }
  .footer-bar { padding: 24px 40px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; background: #1a1a2e; }
  .footer-bar a { display: inline-flex; align-items: center; gap: 8px; background: #c8873a; color: white; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; padding: 12px 28px; text-decoration: none; border-radius: 3px; }
  .footer-bar span { font-size: 12px; color: rgba(255,255,255,0.5); }
  @media(max-width:600px) { .header, .frame-wrap, .footer-bar { padding-left: 20px; padding-right: 20px; } iframe { height: 600px; } }
</style>
</head>

<script>
function sendHeight() {
  var h = document.documentElement.scrollHeight || document.body.scrollHeight;
  window.parent.postMessage({ iframeHeight: h }, '*');
}
window.addEventListener('load', sendHeight);
window.addEventListener('resize', sendHeight);
setTimeout(sendHeight, 400);
setTimeout(sendHeight, 1200);
</script>
